<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposal Details | Nikah Pakistan</title>
    <meta name="theme-color" content="#0A4D3C">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Universal CSS -->
    <link rel="stylesheet" href="../../universal/universal.css">
    <!-- Page-specific CSS -->
    <link rel="stylesheet" href="css/card-detail.css">

    <!-- Universal JS -->
    <script src="../../universal/universal.js"></script>
</head>
<body>
    <!-- Header -->
    <header class="site-header">
        <div class="container d-flex align-center justify-between flex-wrap">
            <div class="logo-area d-flex align-center gap-3">
                <i class="fa-solid fa-mosque fa-2x" style="color: var(--color-accent-gold);"></i>
                <div>
                    <h1 class="site-title">Nikah Pakistan</h1>
                    <span class="urdu" style="color: var(--color-accent-gold);">نکاح پاکستان</span>
                </div>
            </div>
            <nav class="nav-links d-flex gap-4 align-center">
                <a href="../browse/browse.html" class="nav-link">Browse <span class="urdu">رشتے</span></a>
                <a href="../profile/profile.html" class="nav-link">Profile <span class="urdu">پروفائل</span></a>
                <div class="notification-bell" id="notification-bell-placeholder"></div>
            </nav>
        </div>
    </header>

    <main>
        <section class="detail-section">
            <div class="container">
                <!-- Back Button -->
                <div class="mb-4">
                    <a href="../browse/browse.html" class="btn btn-secondary btn-small">
                        <i class="fa-solid fa-arrow-left"></i>
                        <span>Back to Browse</span>
                        <span class="urdu">واپس براؤز پر جائیں</span>
                    </a>
                </div>

                <!-- Detail Card -->
                <div class="detail-card" id="detail-card">
                    <!-- Photo Section -->
                    <div class="detail-photo-wrapper">
                        <img id="detail-photo" src="../../assets/images/placeholder-profile.png" alt="Profile Photo" class="detail-photo">
                        <i id="photo-lock-icon" class="fa-solid fa-lock fa-3x photo-lock-overlay" style="display: none;"></i>
                        <div id="photo-request-text" class="photo-request-text" style="display: none;">
                            <span>Photo visible upon request</span>
                            <span class="urdu">تصویر درخواست پر دکھائی جائے گی</span>
                        </div>
                        <span id="verified-badge" class="verified-badge" style="display: none;">
                            <i class="fa-solid fa-check"></i> Verified
                        </span>
                    </div>

                    <!-- Basic Info -->
                    <div class="detail-content">
                        <h2 id="detail-name" class="detail-name">Loading...</h2>
                        <div class="detail-meta" id="detail-meta"></div>

                        <!-- Sections -->
                        <div id="detail-sections"></div>

                        <!-- Interested Button -->
                        <div class="detail-actions mt-6">
                            <button id="interested-btn" class="btn btn-primary btn-large">
                                <span>Interested</span>
                                <span class="urdu">دلچسپی ہے</span>
                            </button>
                        </div>
                        <div id="detail-message" class="form-message mt-3" style="display: none;"></div>
                    </div>
                </div>

                <!-- Error State -->
                <div id="detail-error" class="no-results text-center p-8" style="display: none;">
                    <i class="fa-solid fa-exclamation-circle fa-3x" style="color: var(--color-error);"></i>
                    <p class="mt-3 font-medium">
                        <span>Proposal not found.</span>
                        <span class="urdu">رشتہ نہیں ملا۔</span>
                    </p>
                    <a href="../browse/browse.html" class="btn btn-secondary mt-4">Back to Browse</a>
                </div>

                <!-- Loading -->
                <div id="detail-loader" class="loader mt-8" style="display: none;"></div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container d-flex flex-col align-center gap-2">
            <div>
                <span class="js-site-name" style="font-weight: 600;"></span> &mdash;
                <span class="js-site-urdu-name urdu"></span>
            </div>
            <div class="footer-links d-flex gap-4">
                <a href="#">About</a>
                <a href="#">Privacy</a>
                <a href="#" class="js-support-email"></a>
            </div>
            <p class="text-small">
                <span>&copy; <span class="js-current-year"></span> All rights reserved.</span>
            </p>
        </div>
    </footer>

    <!-- Firebase -->
    <script type="module" src="../../firebase/firebase-config.js"></script>
    <script type="module" src="../../firebase/firebase-services.js"></script>
    <!-- Page JS -->
    <script type="module" src="js/card-detail.js"></script>
</body>
</html>
