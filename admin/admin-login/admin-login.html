<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Nikah Pakistan</title>
    <meta name="theme-color" content="#0A4D3C">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Universal CSS -->
    <link rel="stylesheet" href="../../universal/universal.css">
    <!-- Page-specific CSS -->
    <link rel="stylesheet" href="css/admin-login.css">

    <!-- Universal JS -->
    <script src="../../universal/universal.js"></script>
</head>
<body>
    <main>
        <section class="admin-login-section">
            <div class="container">
                <div class="admin-login-card">
                    <!-- Branding -->
                    <div class="admin-branding text-center mb-6">
                        <i class="fa-solid fa-mosque fa-3x" style="color: var(--color-accent-gold);"></i>
                        <h1 class="mt-3">
                            <span>Nikah Pakistan</span>
                            <span class="urdu">نکاح پاکستان</span>
                        </h1>
                        <p class="text-muted mt-2">
                            <span>Admin Panel</span>
                            <span class="urdu">ایڈمن پینل</span>
                        </p>
                    </div>

                    <!-- Login Form -->
                    <form id="admin-login-form" class="auth-form" novalidate>
                        <div class="form-group">
                            <label class="form-label">
                                <span>Admin Email</span>
                                <span class="urdu">ایڈمن ای میل</span>
                            </label>
                            <div class="input-icon">
                                <i class="fa-solid fa-envelope"></i>
                                <input type="email" id="admin-email" class="form-input" dir="ltr" placeholder="admin@example.com" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">
                                <span>Password</span>
                                <span class="urdu">پاس ورڈ</span>
                            </label>
                            <div class="input-icon">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="admin-password" class="form-input" dir="ltr" placeholder="••••••••" required>
                            </div>
                        </div>

                        <!-- Error Message -->
                        <div id="admin-login-error" class="form-message error" style="display: none;"></div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary btn-block mt-4">
                            <i class="fa-solid fa-right-to-bracket"></i>
                            <span>Login</span>
                            <span class="urdu">لاگ ان</span>
                        </button>

                        <!-- Loading -->
                        <div id="admin-login-loader" class="loader mt-4" style="display: none;"></div>
                    </form>

                    <!-- Back to Main Site -->
                    <div class="text-center mt-6">
                        <a href="../../index/index.html" class="back-link">
                            <i class="fa-solid fa-arrow-left"></i>
                            <span>Back to Main Site</span>
                            <span class="urdu">مرکزی سائٹ پر واپس جائیں</span>
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer (minimal) -->
    <footer class="site-footer">
        <div class="container text-center">
            <p class="text-small">
                <span>&copy; <span class="js-current-year"></span> Nikah Pakistan. All rights reserved.</span>
            </p>
        </div>
    </footer>

    <!-- Firebase -->
    <script type="module" src="../../firebase/firebase-config.js"></script>
    <script type="module" src="../../firebase/firebase-services.js"></script>
    <!-- Page JS -->
    <script type="module" src="js/admin-login.js"></script>
</body>
</html>
