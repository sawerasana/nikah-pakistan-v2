<!-- Notification Bell Component -->
<div class="notification-bell">
    <a href="../notifications/notifications.html" title="Notifications / اطلاعات">
        <i class="fa-solid fa-bell"></i>
        <span class="badge-count notification-badge" style="display: none;">0</span>
    </a>
</div>
<script>
    (async () => {
        const wrapper = document.currentScript.parentElement;
        const badge = wrapper.querySelector('.notification-badge');

        try {
            const auth = window.auth;
            const db = window.db;
            if (!auth || !db) return;
            const user = auth.currentUser;
            if (!user) return;

            const { collection, query, where, getDocs } = await import(
                "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
            );
            const matchesRef = collection(db, "matches", user.uid, "user_matches");
            const q = query(matchesRef, where("isNotified", "==", false));
            const snap = await getDocs(q);
            const count = snap.size;

            if (count > 0) {
                badge.textContent = count;
                badge.style.display = 'flex'; // universal.css uses flex for .badge-count
            } else {
                badge.style.display = 'none';
            }
        } catch (error) {
            // Silently hide badge on error
            badge.style.display = 'none';
            console.warn('Notification bell update failed:', error);
        }
    })();
</script>
